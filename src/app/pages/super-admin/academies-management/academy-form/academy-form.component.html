<div class="p-1">
  <form [formGroup]="academyForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Basic Info -->
    <div class="space-y-4">
      <h3
        class="text-sm font-semibold georgian-text"
        style="color: var(--tui-text-secondary)"
        lang="ka"
      >
        ძირითადი ინფო
      </h3>

      <!-- Name -->
      <label tuiLabel>
        <span class="georgian-text" lang="ka">სახელი <span class="text-red-500">*</span></span>
        <tui-textfield>
          <input tuiTextfield formControlName="name" />
        </tui-textfield>
        @if (academyForm.get('name')?.touched && academyForm.get('name')?.hasError('required')) {
          <span class="text-xs text-red-500 georgian-text" lang="ka">სახელი სავალდებულოა</span>
        }
      </label>

      <!-- Admins (both modes) -->
      <label tuiLabel>
        <span class="georgian-text" lang="ka">ადმინ(ებ)ი <span class="text-red-500">*</span></span>
        @if (isLoadingUsers()) {
          <div
            class="text-sm georgian-text py-2"
            style="color: var(--tui-text-secondary)"
            lang="ka"
          >
            იტვირთება...
          </div>
        } @else {
          <tui-textfield multi tuiChevron [stringify]="stringifyUser">
            <select
              tuiMultiSelect
              formControlName="admins"
              class="georgian-text"
              lang="ka"
              [items]="adminUsers()"
            ></select>
            <tui-data-list *tuiTextfieldDropdown>
              @for (user of adminUsers(); track user._id) {
                <button tuiOption [value]="user" new>
                  <span>{{ stringifyUser(user) }}</span>
                </button>
              } @empty {
                <div
                  class="px-4 py-2 text-sm georgian-text"
                  style="color: var(--tui-text-secondary)"
                  lang="ka"
                >
                  ადმინები ვერ მოიძებნა
                </div>
              }
            </tui-data-list>
          </tui-textfield>
        }
        @if (
          academyForm.get('admins')?.touched && academyForm.get('admins')?.hasError('required')
        ) {
          <span class="text-xs text-red-500 georgian-text" lang="ka">ადმინ(ებ)ი სავალდებულოა</span>
        }
      </label>

      <!-- Status -->
      <label tuiLabel>
        <span class="georgian-text" lang="ka">სტატუსი <span class="text-red-500">*</span></span>
        <tui-textfield tuiChevron [stringify]="stringifyStatus">
          <input tuiSelect formControlName="status" class="georgian-text" lang="ka" />
          <tui-data-list *tuiTextfieldDropdown>
            @for (option of statusOptions; track option) {
              <button tuiOption [value]="option" new>
                <span class="georgian-text" lang="ka">{{ stringifyStatus(option) }}</span>
              </button>
            }
          </tui-data-list>
        </tui-textfield>
      </label>
    </div>

    <!-- Action Buttons -->
    <div class="flex justify-end gap-2 pt-2">
      <button tuiButton appearance="flat" type="button" (click)="onCancel()">
        <span class="georgian-text" lang="ka">გაუქმება</span>
      </button>
      <button tuiButton appearance="primary" type="submit" [disabled]="!academyForm.valid">
        <span class="georgian-text" lang="ka">{{ isEditMode ? 'განახლება' : 'დამატება' }}</span>
      </button>
    </div>
  </form>
</div>
