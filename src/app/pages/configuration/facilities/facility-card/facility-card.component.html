<div tuiCardLarge  tuiAppearance="neutral" class="w-full max-w-sm mx-auto bg-white rounded-lg shadow-lg overflow-hidden">
  <!-- Photo Section -->
  <div class="relative">
    <div class="relative h-48 overflow-hidden">
      <img 
        [src]="primaryPhoto" 
        [alt]="facility.description"
        class="w-full h-full object-cover"
      />
      @if (hasMultiplePhotos) {
        <div class="absolute top-2 right-2 bg-black bg-opacity-60 text-white px-2 py-1 rounded-md flex items-center gap-1 text-sm">
          <tui-icon icon="@lucide.image" class="w-3 h-3"></tui-icon>
          <span>{{ photoCount }}</span>
        </div>
      }
    </div>
  </div>

  <!-- Content Section -->
  <div class="space-y-4">
    <!-- Title and Location -->
    <div class="space-y-2">
      <h3 class="text-lg font-semibold text-gray-600 georgian-text" lang="ka">{{ facility.description }}</h3>
      <div class="flex items-center gap-2 text-gray-600">
        <tui-icon icon="@lucide.map-pin" class="w-4 h-4 text-gray-500"></tui-icon>
        <span class="text-sm georgian-text" lang="ka">
          @if (facility.addressText) {
            {{ facility.addressText }}, 
          }
          {{ cityName }}, {{ countryName }}
        </span>
      </div>
    </div>

    <!-- Status and Toggle Section -->
    <div class="flex items-center justify-between border-t pt-4">
      <div class="flex items-center">
        @if (facility.activeState) {
          <tui-chip 
            appearance="success" 
            class="status-badge"
          >
            <span class="georgian-text" lang="ka">გამოქვეყნებული</span>
          </tui-chip>
        } @else {
          <tui-chip 
            appearance="info" 
            class="status-badge"
          >
            <span class="georgian-text" lang="ka">მონახაზი</span>
          </tui-chip>
        }
      </div>
      <label  class="cursor-pointer">
        <input
        tuiSwitch
          type="checkbox"
          [ngModel]="isPublished"
          (ngModelChange)="onToggleState($event)"
        />
      </label>
    </div>
  </div>

  <!-- Action Buttons -->
  <div class="flex gap-2">
    <button 
      appearance="secondary"
      iconStart="@lucide.edit"
      size="s"
      tuiButton
      type="button"
      class="flex-1"
      (click)="onEdit($event)"
    >
      <span class="georgian-text" lang="ka">რედაქტირება</span>
    </button>
    <button 
      appearance="secondary"
      iconStart="@lucide.layout-grid"
      size="s"
      tuiButton
      type="button"
      class="flex-1"
      [routerLink]="['/configuration/facilities', facility.id, 'courts']"
    >
      <span class="georgian-text" lang="ka">კორტები</span>
    </button>
  </div>
</div>
