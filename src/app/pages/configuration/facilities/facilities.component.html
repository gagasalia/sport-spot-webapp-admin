<div class="p-8">
  <header class="mb-6">
    <h1 class="text-3xl font-semibold georgian-text" lang="ka">ობიექტები</h1>
  </header>

  @if (facilities().length === 0) {
  <div class="flex flex-col items-center justify-center py-16">
    <img src="images/no-result.png" alt="No facilities" class="w-64 h-64 mb-6 opacity-50" />
    <p class="text-xl text-gray-500 mb-6 georgian-text" lang="ka">ობიექტი დამატებული არ არის</p>
    <button tuiButton appearance="primary" iconStart="@tui.plus" (click)="addFacility()">
      <span class="georgian-text" lang="ka">ობიექტის დამატება</span>
    </button>
  </div>
  } @else {
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    @for (facility of facilities(); track facility.id) {
    <div class="p-4 border rounded-lg">
      <h3 class="text-lg font-medium">{{ facility.description }}</h3>
      <p class="text-sm text-gray-600">{{ facility.city }}</p>
    </div>
    }
  </div>
  }
</div>
