<tui-root [attr.tuiTheme]="darkMode() ? 'dark' : null">
  <!-- Ignore this part, it is only here to position drawer inside the example block -->
  <div>
    <ng-container #viewContainer />
  </div>
  <header tuiNavigationHeader>
    <img src="logos/download.svg" alt="Sport Spot Logo" style="height: 40px" />

    <hr />

    <!-- Dark Mode Toggle -->
    <button
      [iconStart]="darkMode() ? '@tui.sun' : '@tui.moon'"
      tuiIconButton
      type="button"
      (click)="toggleDarkMode()"
      [title]="darkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
    ></button>

    <button iconStart="@tui.bell" tuiIconButton type="button">
      Notifications
      <tui-badge-notification />
    </button>
    <button iconStart="@tui.ellipsis" tuiIconButton type="button">More</button>
  </header>
  <div [style.display]="'flex'">
    <!-- Desktop Sidebar -->
    @if (!isMobile()) {
    <aside [style.height]="'calc(100vh - 48px)'" [tuiNavigationAside]="expanded()">
      <!-- 📅 რეზერვაციები (Reservations) -->
      <button
        automation-id="reservations"
        iconStart="@lucide.calendar-days"
        tuiAsideItem
        type="button"
      >
        <span tuiFade lang="ka" class="georgian-text">რეზერვაციები</span>
      </button>

      <!-- 👥 მომხმარებლები (Users) -->
      <button automation-id="users" iconStart="@lucide.users" tuiAsideItem type="button">
        <span tuiFade lang="ka" class="georgian-text">მომხმარებლები</span>
      </button>

      <!-- 📊 რეპორტები (Reports) -->
      <button automation-id="reports" iconStart="@lucide.bar-chart-2" tuiAsideItem type="button">
        <span tuiFade lang="ka" class="georgian-text">რეპორტები</span>
      </button>

      <hr />

      <tui-aside-group>
        <button
          automation-id="setting"
          iconStart="@tui.settings"
          tuiAsideItem
          tuiChevron
          type="button"
        >
          <span lang="ka" class="georgian-text">კონფიგურაცია</span>
          <ng-template>
            <a iconStart="@lucide.landmark" tuiAsideItem routerLink="/configuration/academy">
              <span lang="ka" class="georgian-text">აკადემია</span>
            </a>
            <a iconStart="@tui.map-pin" tuiAsideItem routerLink="/configuration/facilities">
              <span lang="ka" class="georgian-text">ობიექტები</span>
            </a>
            <a iconStart="@tui.table-cells-merge" tuiAsideItem routerLink="/configuration/courts">
              <span lang="ka" class="georgian-text">კორტები</span>
            </a>
            <a iconStart="@lucide.clock" tuiAsideItem routerLink="/configuration/working-hours">
              <span lang="ka" class="georgian-text">საათები და ფასები</span>
            </a>
          </ng-template>
        </button>
      </tui-aside-group>
      <footer>
        <button
          tuiAsideItem
          type="button"
          [iconStart]="expanded() ? '@tui.chevron-left' : '@tui.chevron-right'"
          (click)="handleToggle()"
        >
          <span lang="ka" class="georgian-text">{{ expanded() ? 'დახურვა' : 'გაფართოება' }}</span>
        </button>
      </footer>
    </aside>
    }
    <main tuiNavigationMain>
      <tui-loader [showLoader]="loading()">
        <div class="w-full flex justify-center">
          <div class="w-full max-w-[1920px] mx-auto">
            <router-outlet />
          </div>
        </div>
      </tui-loader>
    </main>
  </div>

  <!-- Mobile TabBar -->
  @if (isMobile()) {
  <nav tuiTabBar ngProjectAs="tuiOverContent">
    <a icon="@lucide.calendar-days" routerLinkActive tuiTabBarItem routerLink="/reservations">
      <span lang="ka" class="georgian-text">რეზერვაციები</span>
    </a>
    <a icon="@lucide.users" routerLinkActive tuiTabBarItem routerLink="/users">
      <span lang="ka" class="georgian-text">მომხმარებლები</span>
    </a>
    <a icon="@lucide.bar-chart-2" routerLinkActive tuiTabBarItem routerLink="/reports">
      <span lang="ka" class="georgian-text">რეპორტები</span>
    </a>
    <button
      icon="@tui.settings"
      tuiTabBarItem
      type="button"
      [tuiDropdown]="configDropdown"
      [(tuiDropdownOpen)]="configDropdownOpen"
    >
      <span lang="ka" class="georgian-text">კონფიგურაცია</span>
    </button>
  </nav>

  <!-- Configuration Dropdown Template -->
  <ng-template #configDropdown>
    <tui-data-list role="menu">
      <a
        iconStart="@lucide.landmark"
        tuiOption
        role="menuitem"
        routerLink="/configuration/academy"
        (click)="configDropdownOpen.set(false)"
      >
        <span lang="ka" class="georgian-text">აკადემია</span>
      </a>
      <a
        iconStart="@tui.map-pin"
        tuiOption
        role="menuitem"
        routerLink="/configuration/facilities"
        (click)="configDropdownOpen.set(false)"
      >
        <span lang="ka" class="georgian-text">ობიექტები</span>
      </a>
      <a
        iconStart="@tui.table-cells-merge"
        tuiOption
        role="menuitem"
        routerLink="/configuration/courts"
        (click)="configDropdownOpen.set(false)"
      >
        <span lang="ka" class="georgian-text">კორტები</span>
      </a>
      <a
        iconStart="@lucide.clock"
        tuiOption
        role="menuitem"
        routerLink="/configuration/working-hours"
        (click)="configDropdownOpen.set(false)"
      >
        <span lang="ka" class="georgian-text">საათები და ფასები</span>
      </a>
    </tui-data-list>
  </ng-template>
  }
</tui-root>
