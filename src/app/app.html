<tui-root [attr.tuiTheme]="darkMode() ? 'dark' : null">
  <!-- Ignore this part, it is only here to position drawer inside the example block -->
  <div>
    <ng-container #viewContainer />
  </div>
  <header tuiNavigationHeader>
    <img src="logos/download.svg" alt="Sport Spot Logo" style="height: 40px" />

    <hr />

    <!-- Dark Mode Toggle -->
    <button
      [iconStart]="darkMode() ? '@tui.sun' : '@tui.moon'"
      tuiIconButton
      type="button"
      (click)="toggleDarkMode()"
      [title]="darkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
    ></button>

    <button iconStart="@tui.bell" tuiIconButton type="button">
      Notifications
      <tui-badge-notification />
    </button>
    <button iconStart="@tui.ellipsis" tuiIconButton type="button">More</button>
  </header>
  <div [style.display]="'flex'">
    <aside [style.height]="'calc(100vh - 48px)'" [tuiNavigationAside]="expanded()">
      <!-- 📅 რეზერვაციები (Reservations) -->
      <button
        automation-id="reservations"
        iconStart="@lucide.calendar-days"
        tuiAsideItem
        type="button"
      >
        <span tuiFade lang="ka" class="georgian-text">რეზერვაციები</span>
      </button>

      <!-- 👥 მომხმარებლები (Users) -->
      <button automation-id="users" iconStart="@lucide.users" tuiAsideItem type="button">
        <span tuiFade lang="ka" class="georgian-text">მომხმარებლები</span>
      </button>

      <!-- 📊 რეპორტები (Reports) -->
      <button automation-id="reports" iconStart="@lucide.bar-chart-2" tuiAsideItem type="button">
        <span tuiFade lang="ka" class="georgian-text">რეპორტები</span>
      </button>

      <hr />

      <tui-aside-group>
        <button
          automation-id="setting"
          iconStart="@tui.settings"
          tuiAsideItem
          tuiChevron
          type="button"
        >
          <span lang="ka" class="georgian-text">კონფიგურაცია</span>
          <ng-template>
            <a iconStart="@tui.map-pin" tuiAsideItem routerLink="/configuration/facilities">
              <span lang="ka" class="georgian-text">ობიექტები</span>
            </a>
            <button iconStart="@tui.table-cells-merge" tuiAsideItem type="button">
              <span lang="ka" class="georgian-text">კორტები</span>
            </button>
            <button iconStart="@lucide.clock" tuiAsideItem type="button">
              <span lang="ka" class="georgian-text">სამუშაო საათები</span>
            </button>
            <button iconStart="@lucide.clipboard-list" tuiAsideItem type="button">
              <span lang="ka" class="georgian-text">რეზერვაციის წესები</span>
            </button>
            <button iconStart="@lucide.palette" tuiAsideItem type="button">
              <span lang="ka" class="georgian-text">საიტის ვიზუალი</span>
            </button>
            <button iconStart="@lucide.tags" tuiAsideItem type="button">
              <span lang="ka" class="georgian-text">ფასები</span>
            </button>
          </ng-template>
        </button>
      </tui-aside-group>
      <footer>
        <button
          tuiAsideItem
          type="button"
          [iconStart]="expanded() ? '@tui.chevron-left' : '@tui.chevron-right'"
          (click)="handleToggle()"
        >
          <span lang="ka" class="georgian-text">{{ expanded() ? 'დახურვა' : 'გაფართოება' }}</span>
        </button>
      </footer>
    </aside>
    <main tuiNavigationMain>
      <tui-loader [showLoader]="loading()">
        <div class="w-full flex justify-center">
          <div class="w-full max-w-[1920px] mx-auto">
            <router-outlet />
          </div>
        </div>
      </tui-loader>
    </main>
  </div>
</tui-root>
