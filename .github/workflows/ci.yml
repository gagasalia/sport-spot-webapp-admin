name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    name: Lint, test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Unit tests (ChromeHeadless)
        # GitHub-hosted ubuntu runners ship with Chrome preinstalled.
        # Karma can hang forever if Chrome fails to start on the runner.
        timeout-minutes: 15
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build
        run: npm run build
