<section class="space-y-6">
  <p-card class="shadow-sm">
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-lg font-semibold">Upcoming reservations</h2>
          <p class="text-sm text-surface-500">Review the next sessions and act on pending approvals.</p>
        </div>
        <button pButton icon="pi pi-plus" label="New reservation" class="hidden md:inline-flex"></button>
      </div>
    </ng-template>

    <p-table
      [value]="reservations"
      responsiveLayout="scroll"
      class="mt-4"
      dataKey="time"
      [styleClass]="'text-sm'
        "
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Court</th>
          <th>Player</th>
          <th class="min-w-[140px]">Time</th>
          <th>Status</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-reservation>
        <tr>
          <td>{{ reservation.court }}</td>
          <td>{{ reservation.player }}</td>
          <td>{{ reservation.time }}</td>
          <td>
            <p-tag
              [severity]="reservation.status === 'confirmed' ? 'success' : reservation.status === 'pending' ? 'warning' : 'danger'"
              [value]="reservation.status"
              class="capitalize"
            ></p-tag>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</section>
