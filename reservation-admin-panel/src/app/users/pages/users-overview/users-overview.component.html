<div class="grid gap-6 lg:grid-cols-3">
  <p-card class="lg:col-span-2">
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-lg font-semibold">Team directory</h2>
          <p class="text-sm text-surface-500">Select a user to review reservation responsibilities.</p>
        </div>
        <span class="hidden text-xs font-medium uppercase tracking-wide text-primary-500 lg:inline">3 active staff</span>
      </div>
    </ng-template>

    <p-listbox
      [options]="users"
      optionLabel="name"
      [styleClass]="'w-full border-none'
        "
    >
      <ng-template let-user pTemplate="item">
        <div class="flex flex-col gap-1 rounded-xl border border-surface-200 p-4 dark:border-surface-700">
          <span class="font-medium">{{ user.name }}</span>
          <span class="text-xs text-surface-500">{{ user.email }}</span>
          <span class="text-xs font-semibold uppercase tracking-wide text-primary-500">{{ user.role }}</span>
        </div>
      </ng-template>
    </p-listbox>
  </p-card>

  <p-card>
    <ng-template pTemplate="header">
      <h2 class="text-lg font-semibold">Invite staff member</h2>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-4 space-y-4">
      <span class="p-float-label">
        <input id="name" pInputText type="text" formControlName="name" />
        <label for="name">Full name</label>
      </span>
      <span class="p-float-label">
        <input id="email" pInputText type="email" formControlName="email" />
        <label for="email">Email</label>
      </span>
      <span class="p-float-label">
        <input id="role" pInputText type="text" formControlName="role" />
        <label for="role">Role</label>
      </span>
      <button pButton type="submit" label="Send invite" class="w-full"></button>
    </form>
  </p-card>
</div>
