<header class="sticky top-0 z-10 border-b border-surface-200 bg-surface-0/90 backdrop-blur dark:border-surface-700 dark:bg-surface-900/90">
  <div class="flex items-center justify-between gap-4 px-4 py-3 md:px-6">
    <button
      type="button"
      pButton
      class="p-button-text p-button-rounded md:hidden"
      icon="pi pi-bars"
      (click)="menuToggle.emit()"
      aria-label="Toggle menu"
    ></button>
    <p-menubar
      [model]="menuItems"
      class="hidden flex-1 border-none bg-transparent shadow-none md:flex"
      styleClass="w-full bg-transparent border-none shadow-none"
    >
      <ng-template pTemplate="start">
        <div class="flex items-center gap-3">
          <span class="rounded-full bg-primary-500 p-2 text-surface-0">
            <i class="pi pi-calendar text-base"></i>
          </span>
          <div class="hidden text-left md:block">
            <p class="text-sm font-semibold leading-tight">Reservation Admin</p>
            <p class="text-xs text-surface-500">Manage facilities & events</p>
          </div>
        </div>
      </ng-template>
      <ng-template pTemplate="end">
        <div class="flex items-center gap-4">
          <button pButton class="p-button-rounded p-button-text" icon="pi pi-sun" aria-label="Toggle theme"></button>
          <p-avatar label="AD" shape="circle" class="bg-primary-100 text-primary-700"></p-avatar>
        </div>
      </ng-template>
    </p-menubar>
    <div class="flex flex-1 items-center justify-end gap-4 md:hidden">
      <p-avatar label="AD" shape="circle" class="bg-primary-100 text-primary-700"></p-avatar>
    </div>
  </div>
</header>
