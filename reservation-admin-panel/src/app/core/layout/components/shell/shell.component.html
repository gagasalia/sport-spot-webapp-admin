<div class="min-h-screen bg-surface-100 text-surface-900 dark:bg-surface-900 dark:text-surface-0">
  <app-sidebar
    [visible]="sidebarVisible"
    [menuItems]="menuItems"
    (visibleChange)="onSidebarVisibilityChange($event)"
  ></app-sidebar>

  <div class="flex min-h-screen flex-col">
    <app-topbar
      class="shadow-sm"
      [menuItems]="menuItems"
      (menuToggle)="toggleSidebar()"
    ></app-topbar>

    <main class="flex flex-1 flex-col gap-6 p-6">
      <section class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
        <article class="dashboard-card">
          <h2 class="text-lg font-semibold text-surface-900 dark:text-surface-0">Today's Reservations</h2>
          <p class="mt-2 text-sm text-surface-600 dark:text-surface-300">
            Monitor upcoming bookings and manage court availability effortlessly.
          </p>
        </article>
        <article class="dashboard-card">
          <h2 class="text-lg font-semibold text-surface-900 dark:text-surface-0">Revenue Snapshot</h2>
          <p class="mt-2 text-sm text-surface-600 dark:text-surface-300">
            Track payments and outstanding balances across facilities.
          </p>
        </article>
        <article class="dashboard-card">
          <h2 class="text-lg font-semibold text-surface-900 dark:text-surface-0">Team Activity</h2>
          <p class="mt-2 text-sm text-surface-600 dark:text-surface-300">
            Stay updated with staff assignments, cancellations, and notes.
          </p>
        </article>
      </section>

      <section class="flex-1 rounded-2xl border border-dashed border-surface-300 bg-surface-0 p-6 shadow-sm dark:border-surface-700 dark:bg-surface-800">
        <router-outlet></router-outlet>
      </section>
    </main>
  </div>
</div>
