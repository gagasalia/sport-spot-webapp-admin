<div class="grid gap-6 lg:grid-cols-3">
  <p-card class="lg:col-span-2">
    <ng-template pTemplate="header">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Weekly revenue</h2>
        <span class="text-sm text-surface-500">$4,140 this week</span>
      </div>
    </ng-template>

    <div class="h-64">
      <p-chart type="line" [data]="revenueData" [options]="revenueOptions"></p-chart>
    </div>
  </p-card>

  <p-card>
    <ng-template pTemplate="header">
      <h2 class="text-lg font-semibold">Recent transactions</h2>
    </ng-template>

    <p-timeline [value]="paymentTimeline" align="alternate" class="mt-4">
      <ng-template pTemplate="content" let-event>
        <div class="rounded-xl border border-surface-200 bg-surface-0 p-4 shadow-sm dark:border-surface-700 dark:bg-surface-800">
          <p class="text-sm font-semibold">{{ event.status }}</p>
          <p class="mt-1 text-xs text-surface-500">{{ event.detail }}</p>
          <p class="mt-2 text-xs font-medium text-primary-500">{{ event.date }}</p>
        </div>
      </ng-template>
    </p-timeline>
  </p-card>
</div>
